    // Fungsi Render Produk dengan Fitur Filter Merk & Detail Lengkap
    function renderProducts(filterBrandName = 'Semua') {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';

        const filteredData = filterBrandName === 'Semua' 
            ? acBaruData 
            : acBaruData.filter(p => p["Merk AC"].toLowerCase() === filterBrandName.toLowerCase());

        filteredData.forEach(p => {
            const card = document.createElement('div');
            card.className = 'bg-gray-900 border border-gray-800 rounded-xl p-5 hover:border-cyan-500 transition duration-300 flex flex-col justify-between';
            
            // Format Rupiah
            const formattedPrice = p['Harga'].toLocaleString('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
            
            // Link WA untuk pemesanan langsung unit spesifik ini
            const waMessage = `Halo Maknyess ID, saya tertarik memesan unit AC Baru: \n- Merk: ${p['Merk AC']} \n- Tipe: ${p['Tipe']} (${p['Ukuran PK']} PK)\n- Harga: ${formattedPrice}`;
            const waLink = `https://wa.me/6285810636479?text=${encodeURIComponent(waMessage)}`;

            card.innerHTML = `
                <div>
                    <img src="https://placehold.co/400x250/111827/06b6d4?text=${p['Merk AC']}" class="w-full h-36 object-cover rounded-md mb-4" alt="${p['Merk AC']}">
                    <h3 class="font-extrabold text-lg text-white leading-tight">${p['Merk AC']} ${p['Ukuran PK']} PK</h3>
                    <p class="text-xs text-gray-500 font-mono mt-1">${p['Tipe']}</p>
                    <p class="text-2xl font-black text-cyan-400 mt-3">${formattedPrice}</p>
                    
                    <!-- SPESIFIKASI RINCI MANUAL KOREKSI -->
                    <div class="mt-4 border-t border-gray-800 pt-3 space-y-1.5 text-xs text-gray-300">
                        <p class="flex justify-between"><span class="text-gray-500">BTU/h:</span> <strong>${p['BTU / H']}</strong></p>
                        <p class="flex justify-between"><span class="text-gray-500">Daya Listrik:</span> <strong>${p['Watt']} W</strong></p>
                        <p class="flex justify-between"><span class="text-gray-500">Jenis Refrigerant:</span> <strong>${p['Jenis Refrigerant']}</strong></p>
                        <p class="flex justify-between"><span class="text-gray-500">Ukuran Pipa:</span> <strong>${p['Ukuran Pipa']}</strong></p>
                        <p class="flex justify-between"><span class="text-gray-500">Buatan:</span> <strong>${p['Buatan']}</strong></p>
                        <p class="flex justify-between"><span class="text-gray-500">Garansi Spare Part:</span> <strong>${p['Garansi Spare Part']}</strong></p>
                        <p class="flex justify-between"><span class="text-gray-500">Garansi Kompresor:</span> <strong>${p['Garansi Kompresor']}</strong></p>
                    </div>
                </div>
                <div class="mt-6">
                    <a href="${waLink}" target="_blank" class="block w-full py-2.5 bg-cyan-500 text-gray-950 font-bold rounded-lg text-center text-xs hover:bg-cyan-400 transition">
                        <i class="fab fa-whatsapp mr-1"></i> Pesan AC Ini via WA
                    </a>
                </div>`;
            
            grid.appendChild(card);
        });
    }

    // Fungsi Pengendali Tombol Filter
    function filterBrand(brand) {
        // Ganti status aktif pada tombol filter
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent === brand) {
                btn.classList.add('active');
            }
        });
        // Render ulang daftar produk
        renderProducts(brand);
    }

    // Jalankan render pertama kali saat halaman terbuka
    document.addEventListener('DOMContentLoaded', () => {
        renderProducts('Semua');
    });
